# Deploy: fly launch --name sentinel-deepgram-relay
# Set secrets: fly secrets set DEEPGRAM_API_KEY=xxx SENTINEL_WEBHOOK_URL=xxx DEEPGRAM_WEBHOOK_SECRET=xxx

app = "sentinel-deepgram-relay"
primary_region = "sea" # Seattle — closest to Spokane

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

[checks]
  [checks.health]
    port = 8080
    type = "http"
    interval = "30s"
    timeout = "5s"
    path = "/health"
