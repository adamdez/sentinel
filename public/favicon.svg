<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#07070d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)" stroke="#00e5ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <g transform="translate(4, 3) scale(0.75)" filter="url(#glow)">
    <!-- Lion mane -->
    <path d="M16 3 C10 3, 5 7, 5 12 C5 14, 6 16, 8 17.5 L8 15 C8 10, 11 6.5, 16 5.5 C19 5, 22 6, 24 8.5 C26 11, 26 14, 24 17 L25 17 C28 14, 28 9, 25 5.5 C23 3.5, 19.5 3, 16 3Z" fill="#00e5ff" opacity="0.9"/>
    <!-- Lion face -->
    <path d="M12 12 C12 10, 14 8, 17 8 C20 8, 22 10, 22 13 C22 15, 21 17, 19 18.5 L20.5 20 L18 20 L16.5 18.5 C14 18, 12 15, 12 12Z" fill="#00e5ff" opacity="0.85"/>
    <!-- Lion eye -->
    <circle cx="18" cy="12" r="1.2" fill="#07070d"/>
    <!-- House roofline -->
    <path d="M7 22 L16 16.5 L25 22 L23 22 L16 18 L9 22Z" fill="#00ff88" opacity="0.95"/>
    <!-- House body -->
    <path d="M10 22 L10 27 L22 27 L22 22 L16 18.5Z" fill="#00ff88" opacity="0.3"/>
    <!-- House window -->
    <rect x="14" y="23" width="4" height="3.5" rx="0.5" fill="#00ff88" opacity="0.7"/>
  </g>
</svg>
