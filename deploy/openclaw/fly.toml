# ═══════════════════════════════════════════════════════════════════════
# OpenClaw Research Gateway — Fly.io Deployment
# ═══════════════════════════════════════════════════════════════════════
#
# Deploy:
#   cd deploy/openclaw
#   fly launch --copy-config --name openclaw-gateway
#   fly secrets set DEEPSEEK_API_KEY=sk-... ANTHROPIC_API_KEY=sk-ant-... LITELLM_MASTER_KEY=sk-openclaw-...
#   fly deploy
#
# Test:
#   curl https://openclaw-gateway.fly.dev/v1/chat/completions \
#     -H "Authorization: Bearer sk-openclaw-..." \
#     -H "Content-Type: application/json" \
#     -d '{"model":"deepseek-chat","messages":[{"role":"user","content":"Hello"}]}'

app = "openclaw-gateway"
primary_region = "sea"  # Seattle — close to Spokane

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "suspend"   # Suspend after 5 min idle (saves $$$)
  auto_start_machines = true       # Wake on request (~2s cold start)
  min_machines_running = 0         # Allow full suspension when idle

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-2x"  # 2 shared vCPU, 512MB RAM (~$5-10/mo with auto-suspend)
  memory = "1gb"

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 4000
    timeout = "5s"
    type = "http"
