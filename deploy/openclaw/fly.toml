# fly.toml app configuration file generated for openclaw-gateway-frosty-darkness-4048 on 2026-03-04T09:15:10-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'openclaw-gateway-frosty-darkness-4048'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[checks]
  [checks.health]
    port = 4000
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1gb'
  cpus = 2
  memory_mb = 1024
